name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-asyncio httpx starlette

      - name: Install packages in editable mode
        run: |
          for pkg in packages/core packages/explain packages/backtest packages/execution packages/strategy packages/broker_tqsdk packages/broker_crypto packages/datahub packages/features packages/risk packages/sim_live; do
            if [ -d "$pkg" ]; then
              pip install -e "$pkg" 2>/dev/null || true
            fi
          done
          pip install -e apps/api 2>/dev/null || true

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short -x 2>&1 || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check packages/ apps/api/ --select E,F,W --ignore E501,E402,E741

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install and build (web)
        working-directory: apps/web
        run: |
          npm install
          npm run build

      - name: Install and build (web-btc)
        working-directory: apps/web-btc
        run: |
          npm install
          npm run build
