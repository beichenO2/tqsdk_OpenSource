[project]
name = "trading-backtest"
version = "0.1.0"
description = "事件驱动回测引擎 - 支持期货和加密货币策略回测"
requires-python = ">=3.11"
dependencies = [
    "trading-core",
    "numpy>=2.1",
]

[project.optional-dependencies]
# BTC high-level runner (`btc.adapters.BTCBacktestRunner`) loads the strategy registry at runtime.
btc = [
    "trading-strategy",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["backtest", "btc"]
