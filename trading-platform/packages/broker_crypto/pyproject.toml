[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "broker-crypto"
version = "0.1.0"
description = "BTC exchange adapter layer — Binance, OKX, Bybit"
requires-python = ">=3.11"
dependencies = [
    "aiohttp>=3.9",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "aioresponses"]

[tool.hatch.build.targets.wheel]
packages = ["src/broker_crypto"]
