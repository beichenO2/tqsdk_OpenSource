[project]
name = "trading-execution"
version = "0.1.0"
description = "Order execution engine and broker integration"
requires-python = ">=3.11"
dependencies = [
    "trading-core",
    "trading-risk",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"execution" = "."

[tool.setuptools]
packages = ["execution"]
