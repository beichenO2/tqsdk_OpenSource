[project]
name = "trading-sim-live"
version = "0.1.0"
description = "本地模拟撮合引擎"
requires-python = ">=3.11"
dependencies = [
    "trading-core",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"sim_live" = "."

[tool.setuptools]
packages = ["sim_live"]
